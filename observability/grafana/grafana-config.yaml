# Consolidated Grafana configuration with all dashboards
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        editable: true
        jsonData:
          lokiSearch: true
          lokiLive: true
          maxLines: 1000
          logs:
            enableLogDetails: true
            enableLogPatterns: true
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        access: proxy
        url: http://pyroscope:4040
        editable: true
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: default
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: 'k6-performance'
        orgId: 1
        folder: 'K6 Performance'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/k6
      - name: 'api-monitoring'
        orgId: 1
        folder: 'API Monitoring'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/api
      - name: 'enhanced-api-monitoring'
        orgId: 1
        folder: 'API Monitoring'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/enhanced
      - name: 'compact-api-monitoring'
        orgId: 1
        folder: 'API Monitoring'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/compact
      - name: 'compare-api-monitoring'
        orgId: 1
        folder: 'API Monitoring'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/compare
