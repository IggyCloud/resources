apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-compare-dashboard-v2
  namespace: default
data:
  compare-dashboard-v2.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "eShop API Performance Comparison Dashboard with Replica Split Monitoring",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 300,
          "panels": [],
          "title": "📊 Replica Traffic Distribution",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Rate of committed transactions per replica pod, showing how the K8s Service load balances read traffic.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "TPS",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2
              },
              "mappings": [],
              "unit": "short"
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 1 },
          "id": 301,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "editorMode": "code",
              "expr": "sum(irate(pg_stat_database_xact_commit{job=\"postgres-exporter\", pod=~\"postgres-replica-.*\"}[1m])) by (pod)",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "🔄 Read Traffic Split (Transactions per Second)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 11 },
          "id": 100,
          "panels": [],
          "title": "🚀 Original Metrics (Copied)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "ms",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2
              },
              "mappings": [],
              "unit": "ms"
            }
          },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "id": 1,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, rate(http_server_request_duration_seconds_bucket{job!~\"prometheus|kubernetes-services\"}[5m])) * 1000",
              "legendFormat": "P95 | {{job}}",
              "refId": "A"
            }
          ],
          "title": "Response Time Comparison (P95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "reqps",
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "smooth",
                "lineWidth": 2
              },
              "mappings": [],
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "id": 2,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(http_server_request_duration_seconds_count{job!~\"prometheus|kubernetes-services\"}[5m])",
              "legendFormat": "RPS | {{job}}",
              "refId": "A"
            }
          ],
          "title": "Throughput Comparison (RPS)",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 37,
      "style": "dark",
      "tags": ["eShop", "API", "compare", "replicas"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "eShop Performance Compare Dashboard 2 - Replica Split",
      "uid": "eshop-compare-performance-v2",
      "version": 1
    }
