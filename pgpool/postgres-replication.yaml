apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  # The password for the main 'postgres' user
  POSTGRES_PASSWORD: "your-strong-password"
  # The password for the 'replication' user
  REPLICATION_PASSWORD: "your-strong-replication-password"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary-service
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgres-primary

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-primary-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-primary
  template:
    metadata:
      labels:
        app: postgres-primary
    spec:
      containers:
        - name: postgres-primary
          image: postgres:15
          args:
            - "-c"
            - "log_statement=all"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: REPLICATION_PASSWORD
            - name: POSTGRES_DB
              value: "catalog"
          volumeMounts:
            - name: postgres-primary-storage
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-primary-storage
          emptyDir: {}
        - name: init-script
          configMap:
            name: postgres-init-cm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-cm
data:
  init.sh: |
    #!/bin/bash
    set -e
    # Create the replication user
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE USER replication WITH REPLICATION ENCRYPTED PASSWORD '$REPLICATION_PASSWORD';
    EOSQL
    # Add replication entry to pg_hba.conf
    echo "host replication replication all md5" >> /var/lib/postgresql/data/pg_hba.conf

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica-service
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgres-replica

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      initContainers:
        - name: pg-basebackup
          image: postgres:15
          command:
            - "sh"
            - "-c"
            - |
              echo "Waiting for primary to be ready..."
              until pg_isready -h postgres-primary-service -p 5432; do
                sleep 2;
              done
              
              echo "Starting base backup..."
              rm -rf /var/lib/postgresql/data/*
              pg_basebackup -h postgres-primary-service -p 5432 -D /var/lib/postgresql/data -U replication -Fp -Xs -P -R
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: REPLICATION_PASSWORD
          volumeMounts:
            - name: postgres-replica-storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres-replica
          image: postgres:15
          args:
            - "-c"
            - "log_statement=all"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-replica-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-replica-storage
          emptyDir: {}
